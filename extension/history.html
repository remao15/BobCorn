<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AdCheck History</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 800px;
      min-height: 500px;
      background: #f5f5f7;
      color: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      border-bottom: 1px solid rgba(0,0,0,0.08);
      position: sticky;
      top: 0;
      background: #f5f5f7;
      z-index: 10;
    }
    .header-icon { width: 22px; height: 22px; }
    .header-title { font-weight: 800; font-size: 16px; letter-spacing: 0.5px; flex: 1; color: #1a1a1a; }
    .header-stats {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: #666;
    }
    .header-stat {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .header-stat-value {
      font-weight: 700;
      color: #1a1a1a;
    }
    .clear-btn {
      background: rgba(255,68,68,0.1);
      color: #ff6666;
      border: 1px solid rgba(255,68,68,0.3);
      padding: 6px 12px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .clear-btn:hover {
      background: rgba(255,68,68,0.2);
    }
    .filters {
      display: flex;
      gap: 8px;
      padding: 12px 20px;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .filter-btn {
      background: rgba(0,0,0,0.05);
      color: #666;
      border: 1px solid rgba(0,0,0,0.1);
      padding: 6px 12px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover {
      background: rgba(0,0,0,0.08);
    }
    .filter-btn.active {
      background: rgba(0,0,0,0.1);
      color: #1a1a1a;
      border-color: rgba(0,0,0,0.2);
    }
    .product-list {
      padding: 12px 20px;
    }
    .product-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: rgba(0,0,0,0.03);
      border-radius: 8px;
      margin-bottom: 8px;
      transition: background 0.2s;
    }
    .product-row:hover {
      background: rgba(0,0,0,0.06);
    }
    .product-checkbox {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #00cc66;
    }
    .product-checkbox:disabled {
      cursor: not-allowed;
      opacity: 0.3;
    }
    .product-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .product-info {
      flex: 1;
      min-width: 0;
    }
    .product-title {
      font-weight: 600;
      font-size: 13px;
      color: #333;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .product-meta {
      font-size: 11px;
      color: #888;
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .product-score {
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      color: #fff;
    }
    .product-skipped {
      color: #00cc66;
      font-size: 10px;
      font-weight: 600;
    }
    .product-actions {
      display: flex;
      gap: 8px;
    }
    .action-btn {
      background: rgba(0,0,0,0.05);
      color: #666;
      border: 1px solid rgba(0,0,0,0.1);
      padding: 5px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }
    .action-btn:hover {
      background: rgba(0,0,0,0.1);
      color: #1a1a1a;
    }
    .compare-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, #f5f5f7 80%, transparent);
      padding: 20px;
      display: none;
      justify-content: center;
    }
    .compare-bar.visible {
      display: flex;
    }
    .compare-inner {
      background: rgba(0, 204, 102, 0.1);
      border: 1px solid rgba(0, 204, 102, 0.3);
      padding: 12px 24px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .compare-text {
      color: #00cc66;
      font-weight: 600;
      font-size: 13px;
    }
    .compare-btn {
      background: #00cc66;
      color: #000;
      border: none;
      padding: 8px 16px;
      border-radius: 5px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .compare-btn:hover {
      background: #00dd77;
    }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #888;
    }
    .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    .empty-text {
      font-size: 14px;
      line-height: 1.6;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="header">
    <img class="header-icon" src="0.png" alt="AdCheck" />
    <span class="header-title">AdCheck History</span>
    <div class="header-stats">
      <div class="header-stat">
        <span>Saved:</span>
        <span class="header-stat-value" id="total-saved">$0.00</span>
      </div>
      <div class="header-stat">
        <span>Products:</span>
        <span class="header-stat-value" id="total-count">0</span>
      </div>
    </div>
    <button class="clear-btn" id="clear-btn">Clear All</button>
  </div>
  
  <div class="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="skipped">Skipped</button>
    <button class="filter-btn" data-filter="suspicious">Suspicious</button>
    <button class="filter-btn" data-filter="warning">Warning</button>
    <button class="filter-btn" data-filter="clean">Clean</button>
  </div>
  
  <div class="product-list" id="product-list">
    <div class="loading">Loading...</div>
  </div>
  
  <div class="compare-bar" id="compare-bar">
    <div class="compare-inner">
      <span class="compare-text">2 products selected</span>
      <button class="compare-btn" id="compare-btn">Compare selected \u2192</button>
    </div>
  </div>
  
  <script src="utils.js"></script>
  <script src="history.js"></script>
</body>
</html>
